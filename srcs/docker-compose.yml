services:
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - wordpress_files:/var/www/html
    networks:
      - inception_net
    restart: unless-stopped
    depends_on:
      - wordpress

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    env_file:
      - ../.env
    volumes:
      - wordpress_files:/var/www/html
    networks:
      - inception_net
    restart: unless-stopped
    depends_on:
      - mariadb

  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    env_file:
      - ../.env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception_net
    restart: unless-stopped

  redis:
    build: ./requirements/redis
    container_name: redis
    networks:
      - inception_net
    restart: unless-stopped
    expose:
      - "6379"
  
  vsftpd:
    build: ./requirements/vsftpd
    container_name: vsftpd
    env_file:
      - ../.env
    volumes:
      - wordpress_files:/var/www/html
    networks:
      - inception_net
    ports:
      - "20-21:20-21"
      - "30000-30009:30000-30009"
    restart: unless-stopped

  static-site:
    build: ./requirements/static-site
    container_name: static-site
    ports:
      - "8080:3000"
    networks:
      - inception_net
    restart: unless-stopped

  adminer:
    build: ./requirements/adminer
    container_name: adminer
    networks:
      - inception_net
    ports:
      - "8081:8080"
    restart: unless-stopped

  redis-commander:
    build: ./requirements/redis-commander
    container_name: redis-commander
    networks:
      - inception_net
    ports:
      - "8082:8081"
    restart: unless-stopped

volumes:
  wordpress_files:
    name: wordpress_files
    driver: local
    driver_opts:
      type: none
      device: /home/${USER}/data/wordpress
      o: bind
  mariadb_data:
    name: mariadb_data
    driver: local
    driver_opts:
      type: none
      device: /home/${USER}/data/mariadb
      o: bind

networks:
  inception_net:
    name: inception_net
    driver: bridge
